---
- name: Ensure report file exists with header
  copy:
    content: "Hostname,OS,Status\n"
    dest: "{{ playbook_dir }}/report.csv"
    force: false
  delegate_to: localhost
  run_once: true

- name: Append server status to CSV
  lineinfile:
    path: "{{ playbook_dir }}/report.csv"
    line: "'{{ inventory_hostname }}', 'LINUX', '{{ patch_status | default('SUCCESS') }}'"
    insertafter: EOF
  delegate_to: localhost

- name: Log unreachable servers
  lineinfile:
    path: "{{ playbook_dir }}/report.csv"
    line: "'{{ item }}', 'LINUX', 'UNREACHABLE'"
  loop: "{{ ansible_play_hosts_all | difference(ansible_play_hosts) }}"
  delegate_to: localhost
  run_once: true
