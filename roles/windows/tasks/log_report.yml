---
# 1. Logic to define status if not already set by the main playbook's rescue block
- name: Finalize Windows update status
  set_fact:
    update_status: "{{ patch_status | default('SUCCESS') }}"

# 2. Securely append to CSV using lineinfile (prevents file corruption)
- name: Log processed Windows servers
  lineinfile:
    path: "{{ playbook_dir }}/report.csv"
    create: yes
    line: "'{{ inventory_hostname }}', 'WINDOWS', '{{ update_status }}'"
    insertafter: EOF
  delegate_to: localhost

# 3. Log unreachable hosts (Run once per batch to avoid duplicates)
- name: Log unreachable Windows servers
  lineinfile:
    path: "{{ playbook_dir }}/report.csv"
    line: "'{{ item }}', 'WINDOWS', 'UNREACHABLE'"
  loop: "{{ ansible_play_hosts_all | difference(ansible_play_hosts) }}"
  delegate_to: localhost
  run_once: true
